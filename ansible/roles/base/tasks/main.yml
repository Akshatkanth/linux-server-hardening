- name: Update apt cache
  apt:
    update_cache: yes

- name: Upgrade packages
  apt:
    upgrade: dist

- name: Install basic utilities
  apt:
    name:
      - curl
      - vim
      - git
      - ufw
    state: present

- name: Install Fail2Ban
  apt:
    name: fail2ban
    state: present

- name: Ensure Fail2Ban is running
  service:
    name: fail2ban
    state: started
    enabled: true
